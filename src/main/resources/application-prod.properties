spring.application.name=blog_spring-prod

# Production database configuration is provided via environment variables.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Schema is applied via spring.sql.init; in prod consider Flyway/Liquibase for migrations.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# OAuth2 Client (Google) - values provided via environment in production.
# Expected env variables:
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#
# The redirect URI you must configure with Google:
#   https://your-production-domain/login/oauth2/code/google
#
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Actuator and health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Basic hardening toggles (TLS, cookies etc. would be handled in infra / security config)
server.error.include-message=never

