spring.application.name=blog_spring-dev

# In dev we usually talk to local Docker Postgres
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Ensure LoggingAspect (and app) logs appear in console
logging.level.org.example.blog_spring=INFO
logging.level.org.example.blog_spring.aop.LoggingAspect=INFO

# --- JWT (dev) ---
# These are resolved from your environment (e.g. .env) and MUST be set.
security.jwt.secret=${JWT_SECRET}
security.jwt.validity-ms=${JWT_VALIDITY_MS}

# Optional: treat specific Google accounts as ADMIN during OAuth2 login
# security.oauth2.admin-emails=you@example.com,other@example.com

# --- OAuth2 Client (Google) ---
# Configure these environment variables in your dev environment to enable Google login:
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#
# Redirect URI that you must register in Google Cloud console:
#   http://localhost:8080/login/oauth2/code/google
#
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Actuator in dev
management.endpoints.web.exposure.include=health,info,metrics
